name: Dark Psychology Automator
on:
  schedule:
    - cron: '0 13 * * *'
    - cron: '0 19 * * *'
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install --upgrade pip
          pip install edge-tts requests openai-whisper torch
          # We don't need the google library anymore since we use OpenRouter

      - name: Run AI Agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          INSTA_ACCESS_TOKEN: ${{ secrets.INSTA_ACCESS_TOKEN }}
          INSTA_ACCOUNT_ID: ${{ secrets.INSTA_ACCOUNT_ID }}
        run: python main.py

      - name: Download Video
        uses: actions/upload-artifact@v4
        with:
          name: Dark_Reel_${{ github.run_id }}
          path: output/final.mp4
