name: Dark Psychology Automator
on:
  schedule:
    - cron: '0 13 * * *' # 9 AM EST
    - cron: '0 19 * * *' # 3 PM EST
    - cron: '0 0 * * *'  # 8 PM EST
  workflow_dispatch:      # Manual Trigger Button (Run Workflow)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Updated to v4

      - name: Setup Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.9'

      - name: Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install google-generativeai edge-tts requests

      - name: Run AI Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INSTA_ACCESS_TOKEN: ${{ secrets.INSTA_ACCESS_TOKEN }}
          INSTA_ACCOUNT_ID: ${{ secrets.INSTA_ACCOUNT_ID }}
        run: python main.py

      - name: Download Video
        uses: actions/upload-artifact@v4 # FIXED: Changed v3 to v4
        with:
          name: Dark_Reel_${{ github.run_id }}
          path: output/final.mp4
          retention-days: 5
