name: Generate Video Frames (Free AI)
on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run AI Agent
        run: python agent.py

      - name: Upload Zip File
        uses: actions/upload-artifact@v4
        with:
          name: Video_Frames_Zip
          path: generated_images.zip

      - name: Commit Images to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add images/
          git commit -m "Add generated video frames (Pollinations)" || echo "No changes to commit"
          git push
