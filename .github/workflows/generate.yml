name: Generate Batch AI Images
on:
  workflow_dispatch:
    inputs:
      style_prefix:
        type: string
        description: 'Style Prefix (Keeps images consistent for video):'
        default: 'Cinematic, hyper-realistic 8k movie still, consistent lighting, '
      prompts:
        type: string
        description: 'Enter your prompts (TYPE ONE PROMPT PER LINE):'
        required: true
        default: |
          A lone human figure standing in an empty glowing void
          The same human figure walking towards a glowing doorway
          The human figure opening the doorway to reveal a bright light

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run AI Agent
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          STYLE_PREFIX: ${{ github.event.inputs.style_prefix }}
          PROMPTS: ${{ github.event.inputs.prompts }}
        run: python agent.py

      - name: Upload Zip File as Downloadable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Generated_Images_Zip
          path: generated_images.zip

      - name: Commit Images to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add images/
          git commit -m "Add batch generated images" || echo "No changes to commit"
          git push
